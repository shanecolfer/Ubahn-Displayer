version: '3.4'

services:
  ubahndisplayer:
    image: ubahndisplayer
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 ubahn_displayer/__main__.py "]
    ports:
      - 5678:5678
